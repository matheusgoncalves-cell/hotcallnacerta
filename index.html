<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playbook Hot Call - Field Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 800px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #0052cc; padding-bottom: 10px; }
        .header h1 { color: #0052cc; margin: 0; font-size: 24px; }
        .fase { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .fase-titulo { font-size: 18px; font-weight: bold; color: #2d3748; margin-bottom: 15px; display: flex; align-items: center; }
        .fase-titulo span { background: #0052cc; color: white; width: 28px; height: 28px; display: inline-flex; justify-content: center; align-items: center; border-radius: 50%; margin-right: 10px; font-size: 14px; }
        .dica-sdr { background: #fff3cd; color: #856404; padding: 10px; border-left: 4px solid #ffeeba; margin-bottom: 15px; font-size: 13px; font-style: italic; }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        button.btn-acao { background-color: #0052cc; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button.btn-acao:hover { background-color: #0041a3; }
        #resultado { display: none; }
        .script-box { background: white; border: 2px dashed #0052cc; padding: 15px; border-radius: 8px; font-size: 16px; line-height: 1.5; color: #1a202c; margin-bottom: 15px; }
        .script-box strong { color: #0052cc; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        .sucesso .status-badge { background: #c6f6d5; color: #22543d; }
        .alerta .status-badge { background: #feebc8; color: #7b341e; }
        .perigo .status-badge { background: #fed7d7; color: #822727; }
        textarea { width: 100%; height: 120px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-family: sans-serif; resize: none; box-sizing: border-box; }
        .btn-copy { background: #2d3748; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚡ Playbook Hot Call - Field Control</h1>
        <p style="margin:5px 0 0 0; color:#718096; font-size:14px;">Coleta > Validação > Transferência Imediata</p>
    </div>

    <!-- FASE 1: COLETA -->
    <div class="fase" id="fase1">
        <div class="fase-titulo"><span>1</span> Coleta e Quebra de Gelo</div>
        <div class="dica-sdr">🗣️ "Olá! Aqui é da Field Control. Vi seu interesse e estou ligando rapidinho..."</div>
        
        <form id="formFieldControl">
            <div style="display: flex; gap: 15px;">
                <div class="campo" style="flex: 1;">
                    <label>Nome do Lead:</label>
                    <input type="text" id="nome" required placeholder="Com quem estou falando?">
                </div>
                <div class="campo" style="flex: 1;">
                    <label>Empresa:</label>
                    <input type="text" id="empresa" required placeholder="Qual a empresa?">
                </div>
            </div>

            <div class="campo">
                <label>🗣️ "A [Empresa] atua principalmente com qual serviço na rua hoje?"</label>
                <select id="segmento" required>
                    <option value="">-- Selecione o Segmento --</option>
                    <option value="top">Climatização / Solar / Segurança / Elétrica</option>
                    <option value="field_service">Provedor ISP / Assistência / Elevadores / Pragas</option>
                    <option value="enterprise">Facilities / Enterprise (Grandes Operações)</option>
                    <option value="outros">Outros (Serviços Internos / Balcão)</option>
                </select>
            </div>

            <div class="campo">
                <label>🗣️ "Quantos técnicos ou prestadores rodam na rua por vocês?"</label>
                <input type="number" id="tecnicos" required placeholder="Ex: 15">
            </div>

            <div class="campo">
                <label>🗣️ "E pra despachar o serviço pra esses técnicos, usam o que hoje?"</label>
                <select id="processo" required>
                    <option value="">-- Selecione o Processo Atual --</option>
                    <option value="manual">WhatsApp, Planilhas ou Papel</option>
                    <option value="sistema_antigo">Sistema Antigo / Engessado</option>
                    <option value="organizado">Software moderno concorrente</option>
                </select>
            </div>

            <button type="submit" class="btn-acao">Gerar Validação e Script de Passagem</button>
        </form>
    </div>

    <!-- FASE 2 e 3: RESULTADO DINAÂMICO -->
    <div id="resultado">
        <!-- Injetado via JS -->
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
