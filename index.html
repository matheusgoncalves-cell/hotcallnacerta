<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDR Playbook & Pocket Lead Saver - Field Control</title>
    <!-- Tailwind CSS para design moderno e responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-4 flex flex-col items-center">

    <!-- Container Principal Expandido (Dashboard Dual) -->
    <div class="w-full max-w-6xl bg-slate-800 rounded-xl shadow-2xl flex flex-col md:flex-row border border-slate-700 overflow-hidden">
        
        <!-- COLUNA ESQUERDA: CHECKLIST E COLETA DE DADOS -->
        <div class="w-full md:w-5/12 border-b md:border-b-0 md:border-r border-slate-700 flex flex-col bg-slate-850">
            
            <!-- Header fixo do Pocket Saver -->
            <header class="p-4 border-b border-slate-700 bg-slate-900 sticky top-0 z-10">
                <div class="flex justify-between items-center mb-2">
                    <h1 class="text-sm font-bold tracking-wide uppercase text-indigo-400 flex items-center gap-1.5">
                        ⚡ Pocket Lead Saver & Checklist
                    </h1>
                    <span id="progresso-texto" class="text-[11px] bg-indigo-950 text-indigo-300 px-2 py-0.5 rounded-full font-semibold">
                        0/12 Concluídos
                    </span>
                </div>
                <!-- Barra de Progresso -->
                <div class="w-full bg-slate-700 rounded-full h-1.5 overflow-hidden">
                    <div id="progresso-barra" class="bg-gradient-to-r from-indigo-500 to-emerald-400 h-full w-0 transition-all duration-300"></div>
                </div>
            </header>

            <!-- Formulário Rolável -->
            <form id="lead-form" class="flex-1 overflow-y-auto p-4 space-y-3 max-h-[60vh] md:max-h-[68vh]">
                
                <!-- Nome -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>📍 Lead (Nome)</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <input type="text" id="lead" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking" placeholder="Ex: João Silva" required>
                </div>

                <!-- Empresa -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>🏢 Empresa</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <input type="text" id="empresa" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking" placeholder="Ex: SolarTech Energia" required>
                </div>

                <!-- Segmento Seleção Inteligente -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>💼 Segmento de Atuação (Foco Campo)</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <select id="segmento" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking" required>
                        <option value="">-- Escolha o segmento --</option>
                        <option value="top">Climatização / Solar / Segurança / Elétrica</option>
                        <option value="field_service">Provedor ISP / Assistência / Elevadores / Pragas</option>
                        <option value="enterprise">Facilities / Enterprise (Grandes Operações)</option>
                        <option value="outros">Outros (Serviços Internos / Balcão)</option>
                    </select>
                </div>

                <!-- Técnicos de Campo -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>👷 Técnicos em Campo (Mínimo Ideal: 3+)</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <input type="number" id="tecnicos" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking" placeholder="Ex: Qtd de técnicos na rua" required>
                </div>

                <!-- Sistema / Processo Atual -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>🌐 Processo / Sistema Atual</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <select id="sistema" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking" required>
                        <option value="">-- Selecione a dor atual --</option>
                        <option value="manual">WhatsApp, Planilhas ou Papel</option>
                        <option value="sistema_antigo">Sistema Antigo / Engessado</option>
                        <option value="organizado">Software moderno concorrente</option>
                    </select>
                </div>

                <!-- Funcionários Internos -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>📌 Funcionários Internos</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <input type="text" id="internos" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking" placeholder="Ex: Operadores de mesa / backoffice">
                </div>

                <!-- Contratos -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>📄 Tipo de Contratos</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <input type="text" id="contratos" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking" placeholder="Ex: Recorrentes, avulsos, SLAs corporativos">
                </div>

                <!-- O.S. por Dia -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>📎 O.S. por Dia (Volume)</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <input type="text" id="os" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking" placeholder="Ex: Média diária de ordens de serviço">
                </div>

                <!-- Ponto de Dor -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>⚠️ Principal Ponto de Dor</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <textarea id="dor" rows="2" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking resize-none" placeholder="Ex: Técnico não envia relatório, perda de prazos..."></textarea>
                </div>

                <!-- Telefone -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>📞 Telefone</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <input type="tel" id="telefone" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking" placeholder="(00) 00000-0000">
                </div>

                <!-- Email -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>✉️ Email Corporativo</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <input type="email" id="email" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking" placeholder="exemplo@empresa.com">
                </div>

                <!-- Agendamento / Status -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>📅 Status de Agendamento</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <input type="text" id="agendamento" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking" placeholder="Ex: Transferido imediato ou Agendado no ato">
                </div>

                <!-- Informações Extras -->
                <div class="group relative bg-slate-800 p-2.5 rounded-lg border border-slate-700 hover:border-indigo-500/50 transition-all">
                    <label class="flex items-center justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>📝 Informações Extras / Cargo</span>
                        <span class="status-check text-slate-500 text-[10px]">⚪</span>
                    </label>
                    <textarea id="extras" rows="2" class="w-full bg-slate-900 text-sm text-slate-100 rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-indigo-500 input-tracking resize-none" placeholder="Observações e notas sobre o decisor"></textarea>
                </div>
            </form>

            <!-- Painel de Ações Rápidas do Checklist -->
            <div class="p-4 bg-slate-900 border-t border-slate-700 space-y-2">
                <div class="grid grid-cols-2 gap-2">
                    <button type="submit" form="lead-form" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-3 rounded text-xs transition-all flex items-center justify-center gap-1">
                        📊 Qualificar e Salvar
                    </button>
                    <button type="button" onclick="copyFormattedText(event)" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-3 rounded text-xs transition-all flex items-center justify-center gap-1">
                        📋 Copiar Dados Ficha
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button type="button" onclick="clearForm()" class="bg-slate-700 hover:bg-slate-600 text-slate-300 py-1.5 px-3 rounded text-xs transition-all">
                        Limpar Tela
                    </button>
                    <button type="button" onclick="toggleHistory()" class="bg-slate-700 hover:bg-slate-600 text-slate-300 py-1.5 px-3 rounded text-xs transition-all flex items-center justify-center gap-1">
                        📜 Histórico Interno (<span id="history-count">0</span>)
                    </button>
                </div>
            </div>

            <!-- Seção do Histórico Interno Retrátil -->
            <div id="history-section" class="hidden max-h-[220px] overflow-y-auto bg-slate-950 border-t border-slate-700 p-3">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Histórico de Salvos (LocalStorage)</h3>
                    <button onclick="clearAllHistory()" class="text-[10px] text-red-400 hover:underline">Limpar Tudo</button>
                </div>
                <div id="history-list" class="space-y-1.5">
                    <!-- Leads injetados por JS -->
                </div>
            </div>
        </div>

        <!-- COLUNA DIREITA: INTEGRAÇÃO PLAYBOOK HOT CALL -->
        <div class="w-full md:w-7/12 p-5 flex flex-col justify-start bg-slate-800 overflow-y-auto max-h-[85vh] md:max-h-[none]">
            <div id="instrucoes-iniciais" class="text-center py-20 text-slate-400 space-y-3">
                <div class="text-5xl text-indigo-500">⚡</div>
                <h3 class="text-lg font-bold text-slate-300">Painel de Abordagem Imediata</h3>
                <p class="text-sm max-w-sm mx-auto text-slate-400">Preencha o formulário e clique em <strong>Qualificar e Salvar</strong> para gerar automaticamente a estrutura de micro-sim e scripts de transferência quente.</p>
            </div>

            <!-- Bloco Injetável de Resultados Dinâmicos -->
            <div id="resultado" class="hidden space-y-5">
                <!-- Injetado via JS -->
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
